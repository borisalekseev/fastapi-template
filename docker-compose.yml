services:
  postgres:
    image: postgres:18-alpine
    container_name: app-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 1s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  backend:
    build:
      context: .
    container_name: app-backend
    profiles:
      - full
    ports:
      - "8080:8080"
    environment:
      ASYNCPG_DSN: postgresql+asyncpg://app:app@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
